    axis_linear:  # Left thumb stick vertical
      x: 1
      y: 0
      z: 4
    scale_linear:
      x: 0.05
      y: -0.05
      z: -0.03
    #scale_linear_turbo:
      #x: 1.5

    axis_angular:  # Left thumb stick horizontal
      yaw: -1
      pitch: -1
      roll: -1
    #scale_angular:
      #yaw: 0.4

    enable_button: 5  # Left trigger button
    enable_turbo_button: -1  # Right trigger button
